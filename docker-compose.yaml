services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ./data/ollama:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    # Pull the model on first run, then keep serving.
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        ollama serve &
        pid=$$!
        # Wait for the server to accept requests.
        until ollama list >/dev/null 2>&1; do sleep 1; done
        # Pull the model if it isn't present yet.
        ollama list | grep -q "qwen2.5-coder:1.5b" || ollama pull qwen2.5-coder:1.5b
        wait $$pid

  openwebui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: openwebui
    restart: unless-stopped
    depends_on:
      ollama:
        condition: service_healthy
    ports:
      - "3000:8080"
    environment:
      # Point OpenWebUI at Ollama's native integration.
      - OLLAMA_BASE_URL=http://ollama:11434
      - WEBUI_AUTH=false
    volumes:
      - ./data/openwebui:/app/backend/data

  # OpenClaw gateway (the agent daemon + Control UI on :18789).
  openclaw-gateway:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: openclaw-gateway
    restart: unless-stopped
    depends_on:
      ollama:
        condition: service_healthy
    ports:
      - "18789:18789"
    environment:
      - OPENCLAW_GATEWAY_BIND=lan
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN}
    volumes:
      - ./data/openclaw:/home/node/.openclaw
      - ./data/openclaw/config:/home/node/.config/openclaw

  # One-shot onboarding: points OpenClaw at Ollama's NATIVE api (no /v1),
  # writes config, then exits. Shares the gateway's network namespace so it
  # reaches Ollama at the same address the gateway uses.
  openclaw-cli:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: openclaw-cli
    restart: "no"
    # Share the gateway container's network namespace so the CLI reaches the
    # running gateway at 127.0.0.1:18789 (its own loopback otherwise has nothing
    # listening → ws 1006 → embedded fallback with no structured tool calls).
    # It still reaches ollama via the gateway's network (same compose network).
    network_mode: "service:openclaw-gateway"
    depends_on:
      openclaw-gateway:
        condition: service_started
      ollama:
        condition: service_healthy
    environment:
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN}
    volumes:
      - ./data/openclaw:/home/node/.openclaw
      - ./data/openclaw/config:/home/node/.config/openclaw
    entrypoint: ["openclaw"]
    command:
      - onboard
      - --non-interactive
      - --accept-risk
      - --mode=local
      - --auth-choice=ollama
      - --custom-base-url=http://ollama:11434
      - --custom-model-id=qwen2.5-coder:1.5b
      - --gateway-auth=token
      - --gateway-token-ref-env=OPENCLAW_GATEWAY_TOKEN
      # Bind to lan so the mapped host port 18789 reaches the gateway (loopback
      # would only listen on the container's own localhost).
      - --gateway-bind=lan
      # The gateway is a separate container, so the post-onboard health probe to
      # 127.0.0.1:18789 can't reach it — skip it; onboarding writes config fine.
      - --skip-health
